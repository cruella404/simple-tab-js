<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Datepicker + Tooltip UI</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>📅 UI Components</h1>

<!-- ================= DATEPICKER ================= -->
<section class="section">
  <h2>Datepicker UI (CSS Only)</h2>

  <div class="datepicker">
    <div class="header">
      <span>←</span>
      <h3>March 2026</h3>
      <span>→</span>
    </div>

    <div class="days">
      <div>Sun</div><div>Mon</div><div>Tue</div>
      <div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
    </div>

    <div class="dates">
      <div class="muted">23</div>
      <div class="muted">24</div>
      <div>25</div>
      <div>26</div>
      <div>27</div>
      <div>28</div>
      <div class="selected">29</div>

      <div>30</div>
      <div>31</div>
      <div>1</div>
      <div>2</div>
      <div>3</div>
      <div>4</div>
      <div>5</div>

      <div>30</div>
      <div>7</div>
      <div>8</div>
      <div>9</div>
      <div>10</div>
      <div>11</div>
      <div>12</div>

      <div>13</div>
      <div>14</div>
      <div>15</div>
      <div>16</div>
      <div>17</div>
      <div>18</div>
      <div>19</div>
    </div>
  </div>
</section>

<!-- ================= TOOLTIPS ================= -->
<section class="section">
  <h2>Tooltip UI (CSS Only)</h2>

  <div class="tooltip-container">
    
    <button class="tooltip">
      Hover me
      <span class="tooltip-text">Simple tooltip</span>
    </button>

    <button class="tooltip">
      Info ℹ️
      <span class="tooltip-text bottom">Appears on bottom</span>
    </button>

    <button class="tooltip">
      Delete ❌
      <span class="tooltip-text top">Danger action</span>
    </button>

  </div>

</section>

</body>
</html>
