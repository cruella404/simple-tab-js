<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <title>Cookie consent</title>
</head>
<body>
    <div class="box">
        <div class="title">
            <i class="fa-solid fa-cookie-bite"></i>
            <h2 class="title text">Cookie Consent</h2>
        </div>
        <div class="box-text">
            <p class="cookie-text">This website use cookies to help you have a superior and more admissible browsing experience on the website.<a href="#" class="read-more">Read more</a></p>
        </div>
        <div class="btns">
                <button type="submit" class="accept-btn">Accept</button>
                <button type="submit" class="decline-btn">Decline</button>
        </div>
    </div>
<script src="script.js"></script>
</body>
</html>
